name: Deploy to Gandi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GANDI_SSH_KEY }}

      - name: Add Gandi to known hosts
        run: ssh-keyscan -H git.sd3.gpaas.net >> ~/.ssh/known_hosts

      - name: Configure git
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

      - name: Deploy to Gandi
        run: |
          # Force-add dist/ (overrides .gitignore) for Gandi deployment
          git add -f dist/
          git add server/ package.json package-lock.json .env.example 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Deploy $(date +'%Y-%m-%d %H:%M:%S')"
          git push --force git+ssh://ebde9514-30ea-11f1-bc87-00163eada87b@git.sd3.gpaas.net/default.git HEAD:master
